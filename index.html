<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AvaliaGO — Sistema de Avaliação</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f2447;--navy2:#1a3a6b;--navy3:#2355a0;
  --gold:#e8a020;--gold2:#f5c842;
  --green:#1db36e;--red:#e74c3c;--orange:#e67e22;
  --bg:#f0f3fa;--surface:#fff;--border:#dde3ef;
  --text:#0f1c35;--text2:#556080;--text3:#8898b8;
  --r:10px;--r2:14px;--sh:0 2px 14px rgba(15,36,71,.09);
}
html,body{height:100%;font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);font-size:14px;overflow:hidden}

/* ── LAYOUT ── */
#app{display:flex;height:100vh}
#sidebar{width:230px;min-width:230px;background:var(--navy);display:flex;flex-direction:column;transition:width .2s}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── SIDEBAR ── */
.sb-hd{padding:20px 16px 14px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.sb-logo-ic{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.sb-brand-name{color:#fff;font-size:14px;font-weight:700}
.sb-brand-sub{color:rgba(255,255,255,.4);font-size:10px}
.sb-user{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-uname{color:#fff;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-urole{color:rgba(255,255,255,.5);font-size:11px;margin-top:2px}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0;scrollbar-width:none}
.sb-nav::-webkit-scrollbar{display:none}
.sb-sec{color:rgba(255,255,255,.28);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;padding:10px 16px 3px}
.nav-it{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;border-left:3px solid transparent;transition:.12s}
.nav-it:hover{background:rgba(255,255,255,.07)}
.nav-it.active{background:rgba(255,255,255,.12);border-left-color:var(--gold)}
.nav-ic{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-lb{color:rgba(255,255,255,.82);font-size:12.5px;white-space:nowrap;overflow:hidden;flex:1}
.nav-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:20px;padding:1px 7px;flex-shrink:0}
.sb-ft{padding:10px 16px;border-top:1px solid rgba(255,255,255,.08)}
.logout{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.45);cursor:pointer;font-size:12.5px;padding:5px 2px}
.logout:hover{color:rgba(255,255,255,.82)}

/* ── TOPBAR ── */
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 22px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-title{font-size:15px;font-weight:600}
.tb-right{display:flex;align-items:center;gap:10px}
.month-badge{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:3px 12px;font-size:12px;font-weight:500;color:var(--text2)}

/* ── CONTENT ── */
#content{flex:1;overflow-y:auto;padding:20px}

/* ── CARD ── */
.card{background:var(--surface);border-radius:var(--r2);border:1px solid var(--border);padding:18px;margin-bottom:16px;box-shadow:var(--sh)}
.card-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;gap:10px}
.card-title{font-size:14.5px;font-weight:600;color:var(--navy2)}
.card-sub{font-size:11px;color:var(--text3);margin-top:2px}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}

/* ── STAT ── */
.stat{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--accent,var(--navy2));border-radius:var(--r2);padding:14px 16px;box-shadow:var(--sh)}
.stat-num{font-size:26px;font-weight:700;line-height:1}
.stat-label{font-size:11px;color:var(--text2);margin-top:4px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:7px;border:none;cursor:pointer;font-size:12.5px;font-weight:500;font-family:inherit;transition:.12s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--navy2);color:#fff}.btn-primary:hover{background:var(--navy3)}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:var(--gold2);color:var(--navy)}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#c0392b}
.btn-ghost{background:var(--bg);border:1px solid var(--border);color:var(--text2)}.btn-ghost:hover{background:#e8ecf5}
.btn-sm{padding:4px 10px;font-size:12px;border-radius:5px}

/* ── FORM ── */
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px}
.fg label .cn{color:var(--text3);font-size:10px;font-weight:300;margin-left:3px}
input,select,textarea{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;outline:none;background:var(--surface);color:var(--text);transition:border-color .12s}
input:focus,select:focus,textarea:focus{border-color:var(--navy3);box-shadow:0 0 0 3px rgba(35,85,160,.1)}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.cb-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:5px}
.cb-item{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:13px;padding:4px 7px;border-radius:5px}
.cb-item:hover{background:var(--bg)}
.cb-item input[type=checkbox]{width:auto;accent-color:var(--navy2)}

/* ── TABLE ── */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{background:#f5f7fc;font-size:11px;font-weight:600;color:var(--text2);padding:8px 11px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
tbody td{padding:8px 11px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tbody tr:hover{background:#f8fafd}
tbody tr:last-child td{border-bottom:none}

/* ── TAGS ── */
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.tag-leve{background:#e8f5e9;color:#1db36e}
.tag-medio{background:#fff3e0;color:#e67e22}
.tag-grave{background:#fde8e8;color:#e74c3c}
.tag-critico{background:#1a0000;color:#ff7070}
.tag-bom{background:#e8f5e9;color:#1db36e}
.tag-muitobom{background:#e3f2fd;color:#1565c0}
.tag-excelente{background:#ede7f6;color:#7c3aed}
.tag-extraordinario{background:#fff8e1;color:#c65100}
.tag-pendente{background:#fff3cd;color:#856404}
.tag-aprovado{background:#d1f7e0;color:#0d6e33}
.tag-recusado{background:#fde8e8;color:#e74c3c}
.tag-cancelado{background:#eceff1;color:#607d8b}
.tag-admin{background:#1a0033;color:#c084fc}
.tag-gerente{background:#fff3e0;color:#c65100}
.tag-coordenador{background:#e3f2fd;color:#1565c0}
.tag-supervisor{background:#e8f5e9;color:#1db36e}
.tag-lider{background:#f3f4f6;color:#374151}
.turno{background:#e8ecf8;color:var(--navy2);font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px}

/* ── PROGRESS ── */
.pb-w{background:#e8ecf5;border-radius:20px;height:6px;width:80px;overflow:hidden;display:inline-block;vertical-align:middle}
.pb{height:6px;border-radius:20px}
.pts-p{color:var(--green);font-weight:700}
.pts-n{color:var(--red);font-weight:700}

/* ── MODAL ── */
.mo{position:fixed;inset:0;background:rgba(10,20,50,.52);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(2px);padding:16px}
.modal{background:var(--surface);border-radius:16px;padding:26px;max-width:540px;width:100%;max-height:92vh;overflow-y:auto;position:relative;box-shadow:0 24px 80px rgba(0,0,0,.25)}
.modal-lg{max-width:680px}
.modal-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:18px}
.modal-x{position:absolute;top:14px;right:16px;font-size:21px;cursor:pointer;color:var(--text3);background:none;border:none;line-height:1}
.modal-x:hover{color:var(--text)}
.modal-ft{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}

/* ── ALERTS ── */
.alert{padding:10px 14px;border-radius:7px;font-size:13px;margin-bottom:12px;border-left:4px solid;display:flex;align-items:center;gap:8px}
.alert-info{background:#e8f4fd;color:#1565c0;border-color:#2196f3}
.alert-success{background:#e8f8f0;color:#0d6e33;border-color:var(--green)}
.alert-warn{background:#fff8e1;color:#856404;border-color:var(--gold)}
.alert-error{background:#fde8e8;color:#c0392b;border-color:var(--red)}
.toast{position:fixed;bottom:22px;right:22px;max-width:360px;z-index:9999;box-shadow:var(--sh);animation:su .22s ease}
@keyframes su{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── LOADING ── */
.spin{width:20px;height:20px;border:2.5px solid var(--border);border-top-color:var(--navy2);border-radius:50%;animation:sp .65s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
.loading-row{text-align:center;padding:36px;color:var(--text3)}

/* ── EMPTY ── */
.empty{text-align:center;padding:36px;color:var(--text3);font-size:13px}
.empty-ic{font-size:34px;display:block;margin-bottom:8px}

/* ── CHART ── */
.bc{display:flex;align-items:flex-end;gap:8px;height:120px;padding-top:8px}
.bc-col{display:flex;flex-direction:column;align-items:center;flex:1}
.bc-bar{width:100%;border-radius:4px 4px 0 0;min-height:4px}
.bc-val{font-size:10px;font-weight:600;margin-bottom:2px}
.bc-lbl{font-size:9.5px;color:var(--text3);margin-top:3px;text-align:center}

/* ── LOGIN ── */
#login{position:fixed;inset:0;background:linear-gradient(135deg,#0f2447,#1a3a6b 55%,#2355a0);display:flex;align-items:center;justify-content:center;z-index:2000}
.lcard{background:#fff;border-radius:18px;padding:42px 38px;width:390px;max-width:95vw;box-shadow:0 40px 100px rgba(0,0,0,.35)}
.llogo{text-align:center;margin-bottom:30px}
.llogo-ic{font-size:38px}
.llogo-title{font-size:22px;font-weight:700;color:var(--navy);margin-top:6px}
.llogo-sub{font-size:12px;color:var(--text3);margin-top:3px}
.lbtn{width:100%;justify-content:center;margin-top:16px;padding:11px;font-size:14px;border-radius:9px}

hr.div{border:none;border-top:1px solid var(--border);margin:14px 0}
.hl{background:#fffde7!important}
code{background:#f3f4f6;padding:2px 6px;border-radius:4px;font-size:11.5px}

@media(max-width:900px){.g4,.g5{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.g4,.g5,.g3,.g2{grid-template-columns:1fr}#sidebar{width:54px;min-width:54px}}

/* ── PDF FEEDBACK PREVIEW ── */
.pdf-preview-wrap{background:#6b7280;padding:24px;border-radius:var(--r2);overflow-y:auto;max-height:72vh}
.pdf-page{background:#fff;width:100%;max-width:760px;margin:0 auto;padding:48px 52px;box-shadow:0 8px 32px rgba(0,0,0,.3);font-family:'Sora',Arial,sans-serif;position:relative;min-height:900px}
.pdf-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;padding-bottom:18px;border-bottom:3px solid #0f2447}
.pdf-logo-area{display:flex;align-items:center;gap:10px}
.pdf-logo-box{width:40px;height:40px;background:linear-gradient(135deg,#e8a020,#f5c842);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px}
.pdf-logo-text{font-size:16px;font-weight:700;color:#0f2447}
.pdf-logo-sub{font-size:10px;color:#8898b8;margin-top:1px}
.pdf-meta{text-align:right;font-size:11px;color:#556080}
.pdf-meta b{font-size:12px;color:#0f2447;display:block}
.pdf-hero{background:linear-gradient(135deg,#0f2447,#1a3a6b);border-radius:12px;padding:20px 24px;margin-bottom:22px;color:#fff;display:flex;justify-content:space-between;align-items:center}
.pdf-hero-name{font-size:19px;font-weight:700;margin-bottom:3px}
.pdf-hero-info{font-size:11.5px;opacity:.75}
.pdf-hero-pts{text-align:right}
.pdf-hero-pts-num{font-size:36px;font-weight:700;line-height:1}
.pdf-hero-pts-label{font-size:10px;opacity:.7;margin-top:2px}
.pdf-section-title{font-size:12.5px;font-weight:700;color:#0f2447;margin-bottom:10px;padding-bottom:5px;border-bottom:2px solid #e8ecf5}
.pdf-item{border:1px solid #e8ecf5;border-radius:8px;padding:12px 14px;margin-bottom:9px}
.pdf-item-inconf{border-left:4px solid #e74c3c;background:#fdf8f8}
.pdf-item-bonus{border-left:4px solid #1db36e;background:#f6fef9}
.pdf-item-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.pdf-item-title{font-size:12px;font-weight:700;color:#0f2447}
.pdf-item-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
.pdf-item-motivo{font-size:11px;color:#556080;line-height:1.5;margin-top:4px}
.pdf-item-footer{display:flex;justify-content:space-between;margin-top:7px;font-size:10px;color:#8898b8;align-items:center}
.pdf-item-pts{font-size:13px;font-weight:700}
.pdf-pts-pos{color:#1db36e}
.pdf-pts-neg{color:#e74c3c}
.pdf-summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.pdf-summary-box{background:#f5f7fc;border-radius:8px;padding:10px;text-align:center}
.pdf-summary-num{font-size:20px;font-weight:700;color:#0f2447}
.pdf-summary-label{font-size:9.5px;color:#556080;margin-top:2px}
.pdf-bar-track{background:#e8ecf5;border-radius:20px;height:9px;margin:8px 0 3px;overflow:hidden}
.pdf-bar-fill{height:9px;border-radius:20px}
.pdf-sign-area{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-top:32px;padding-top:18px;border-top:1px solid #e8ecf5}
.pdf-sign-box{text-align:center}
.pdf-sign-line{border-bottom:1px solid #0f2447;margin:36px 10px 7px}
.pdf-sign-name{font-size:11px;color:#0f2447;font-weight:600}
.pdf-sign-role{font-size:10px;color:#8898b8}
.pdf-footer-doc{text-align:center;font-size:9.5px;color:#c0c8d8;margin-top:24px;padding-top:12px;border-top:1px solid #e8ecf5}
.pdf-empty-sec{text-align:center;padding:18px;color:#c0c8d8;font-size:11.5px;border:1px dashed #e8ecf5;border-radius:8px;margin-bottom:10px}
.pdf-filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px}
.pdf-filter-bar .fg{margin:0;flex:1;min-width:150px}
#print-frame{display:none}
@media print{
  body,html{overflow:visible!important;background:#fff!important;height:auto!important}
  #app{display:none!important}
  #print-frame{display:block!important;position:fixed;inset:0;z-index:99999;background:#fff;overflow:auto;padding:0}
  #print-frame .pdf-preview-wrap{background:none!important;padding:0!important}
  #print-frame .pdf-page{box-shadow:none!important;width:100%!important;max-width:none!important;min-height:auto!important;padding:32px 40px!important}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="lcard">
    <div class="llogo">
      <div class="llogo-ic">⭐</div>
      <div class="llogo-title">AvaliaGO</div>
      <div class="llogo-sub">Sistema de Avaliação / 评估系统</div>
    </div>
    <div id="lalert"></div>
    <div class="fg"><label>Login <span class="cn">/ 用户名</span></label>
      <input id="li" placeholder="seu login..." autocomplete="username">
    </div>
    <div class="fg"><label>Senha <span class="cn">/ 密码</span></label>
      <input id="lp" type="password" placeholder="sua senha..." autocomplete="current-password">
    </div>
    <button class="btn btn-primary lbtn" onclick="doLogin()">🔑 Entrar / 登录</button>
    <div style="text-align:center;margin-top:12px;font-size:11px;color:#bbb">Acesso por nível hierárquico / 分级访问</div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div id="sidebar">
    <div class="sb-hd">
      <div class="sb-logo-ic">⭐</div>
      <div><div class="sb-brand-name">AvaliaGO</div><div class="sb-brand-sub">Google Sheets v2.1</div></div>
    </div>
    <div class="sb-user">
      <div class="sb-uname" id="sb-name">—</div>
      <div class="sb-urole" id="sb-role">—</div>
    </div>
    <div class="sb-nav" id="sb-nav"></div>
    <div class="sb-ft">
      <div class="logout" onclick="doLogout()">🚪 <span>Sair / 退出</span></div>
    </div>
  </div>
  <div id="main">
    <div id="topbar">
      <div class="tb-title" id="pg-title">Dashboard</div>
      <div class="tb-right">
        <span class="month-badge" id="tb-month">—</span>
        <span class="tag" id="tb-role">—</span>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>

<div id="mod-container"></div>
<div id="toast-container"></div>
<div id="print-frame"></div>

<script>
'use strict';

// ============================================================
//  ⚠️  COLE AQUI A URL DO SEU WEB APP (Apps Script)
//  Após publicar: Implantar → Nova implantação → App da Web
//  Executar como: EU | Acesso: QUALQUER PESSOA
// ============================================================
var GS_URL = 'COLE_AQUI_A_URL_DO_SEU_WEB_APP';
// Exemplo: 'https://script.google.com/macros/s/AKfycbXXXXX/exec'
// ============================================================

// ===== CONSTANTES =====
var ROLE_LABELS = {
  admin:'Administrador / 管理员', gerente:'Gerente / 经理',
  coordenador:'Coordenador / 协调员', supervisor:'Supervisor / 主管', lider:'Líder / 领班'
};
var INCONF = {
  leve:    {label:'Leve / 轻微',      cn:'轻微',   pts:-5},
  medio:   {label:'Médio / 中等',     cn:'中等',   pts:-10},
  grave:   {label:'Grave / 严重',     cn:'严重',   pts:-20},
  critico: {label:'Crítico / 极严重', cn:'极严重', pts:-40}
};
var BONUS = {
  bom:           {label:'Bom / 良好',           cn:'良好',   pts:5},
  muitobom:      {label:'Muito Bom / 非常好',    cn:'非常好', pts:10},
  excelente:     {label:'Excelente / 优秀',      cn:'优秀',   pts:20},
  extraordinario:{label:'Extraordinário / 卓越', cn:'卓越',   pts:40}
};
var CRITERIOS = [
  {v:'assiduidade',l:'Assiduidade / 出勤'},
  {v:'proatividade',l:'Proatividade / 主动性'},
  {v:'lideranca',l:'Liderança / 领导力'},
  {v:'inovacao',l:'Inovação / 创新'},
  {v:'resultado',l:'Resultado / 成果'},
  {v:'destaque',l:'Destaque / 突出表现'},
  {v:'melhoria',l:'Melhoria sugerida / 改进建议'}
];
var CARGOS = ['auxiliar','focal','assistente'];
var CARGO_LABELS = {auxiliar:'Auxiliar / 辅助员',focal:'Focal / 重点员工',assistente:'Assistente / 助理'};
var TURNOS = ['T1','T2','T3','T4'];
var MODS = ['Carregamento','Indução','Separação','Expedição','Recebimento','Qualidade','Embalagem','Estoque'];

// ===== STATE =====
var S = { user:null, page:'dashboard', config:{meAtual:''}, users:[], colabs:[], registros:[] };

// ============================================================
//  API — usa GET com parâmetros na URL (único método que
//  funciona com CORS no Apps Script sem proxy)
// ============================================================
function api(action, body) {
  body = body || {};
  var encoded = encodeURIComponent(JSON.stringify(body));
  var url = GS_URL + '?action=' + encodeURIComponent(action) + '&data=' + encoded;
  return fetch(url, { method: 'GET', redirect: 'follow' })
    .then(function(r){ return r.json(); })
    .catch(function(e){ return { ok: false, msg: 'Falha de rede: ' + e.message }; });
}

// ===== TOAST =====
function toast(msg, type, dur) {
  type = type || 'info'; dur = dur || 3200;
  var icons = {info:'ℹ️', success:'✅', warn:'⚠️', error:'❌'};
  var el = document.createElement('div');
  el.className = 'alert alert-' + type + ' toast';
  el.innerHTML = '<span>' + (icons[type]||'') + '</span> ' + msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, dur);
}

// ===== LOGIN / LOGOUT =====
function doLogin() {
  var login = document.getElementById('li').value.trim();
  var pass  = document.getElementById('lp').value;
  if (!login || !pass) { lalert('Preencha login e senha', 'warn'); return; }
  if (GS_URL === 'COLE_AQUI_A_URL_DO_SEU_WEB_APP') {
    lalert('⚠️ Configure a variável GS_URL no topo do arquivo HTML com a URL do seu Apps Script!', 'error'); return;
  }
  lalert('<span class="spin"></span> Conectando...', 'info');
  api('login', {login:login, pass:pass}).then(function(res) {
    if (!res.ok) { lalert(res.msg || 'Erro ao conectar', 'error'); return; }
    S.user = res.data;
    loadAll().then(function() {
      document.getElementById('login').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      buildSidebar();
      navigate('dashboard');
    });
  });
}

function lalert(msg, type) {
  document.getElementById('lalert').innerHTML = '<div class="alert alert-' + type + '">' + msg + '</div>';
}

function doLogout() {
  S.user = null; S.users = []; S.colabs = []; S.registros = [];
  document.getElementById('login').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('li').value = '';
  document.getElementById('lp').value = '';
  document.getElementById('lalert').innerHTML = '';
}

// ===== LOAD ALL DATA =====
function loadAll() {
  var u = S.user;
  var mes = S.config.meAtual || '';
  var calls = [
    api('getConfig'),
    api('getColabs',    {callerRole:u.role, callerId:u.id, callerTurno:u.turno||''}),
    api('getRegistros', {callerRole:u.role, callerId:u.id, callerTurno:u.turno||'', mes:mes})
  ];
  if (u.role === 'admin') calls.push(api('getUsers', {callerRole:u.role}));
  // supervisor e coordenador precisam dos usuários para mostrar líderes/supervisores
  if (u.role === 'supervisor' || u.role === 'coordenador') calls.push(api('getUsers', {callerRole:u.role}));

  return Promise.all(calls).then(function(results) {
    if (results[0].ok) S.config   = results[0].data || {};
    if (results[1].ok) S.colabs   = results[1].data || [];
    if (results[2].ok) S.registros= results[2].data || [];
    if (results[3] && results[3].ok) S.users = results[3].data || [];
  });
}

function refreshData() {
  return loadAll().then(function(){ renderPage(); buildSidebar(); });
}

function buildSidebar() {
  var u = S.user;
  document.getElementById('sb-name').textContent = u.name;
  document.getElementById('sb-role').textContent = ROLE_LABELS[u.role] || u.role;
  document.getElementById('tb-role').className = 'tag tag-' + u.role;
  document.getElementById('tb-role').textContent = ROLE_LABELS[u.role] || u.role;
  document.getElementById('tb-month').textContent = '📅 ' + (S.config.meAtual || '');

  var pend = countPending();
  var items = NAV[u.role] || [];
  var html = items.map(function(it) {
    if (it.sec) return '<div class="sb-sec">' + it.sec + '</div>';
    var bdg = it.badge && pend > 0 ? '<span class="nav-badge">' + pend + '</span>' : '';
    return '<div class="nav-it" id="nav-' + it.id + '" onclick="navigate(\'' + it.id + '\')">' +
      '<span class="nav-ic">' + it.ic + '</span>' +
      '<span class="nav-lb">' + it.lb + '</span>' + bdg + '</div>';
  }).join('');

function countPending() {
  var u = S.user;
  if (!u) return 0;
  if (u.role === 'supervisor') {
    var lids = S.users.filter(function(x){ return x.role==='lider' && x.turno===u.turno; }).map(function(x){ return x.id; });
    return S.registros.filter(function(r){ return r.status==='pendente' && r.autorRole==='lider' && lids.indexOf(r.autorId)>=0; }).length;
  }
  if (u.role === 'coordenador') {
    return S.registros.filter(function(r){ return r.status==='pendente' && (r.autorRole==='supervisor'||r.autorRole==='coordenador') && r.autorTurno===u.turno; }).length;
  }
  if (u.role === 'admin') return S.registros.filter(function(r){ return r.status==='pendente'; }).length;
  return 0;
}

// ============================================================
//  HELPERS
// ============================================================
function getColabPts(id, mes) {
  var pts = 100;
  S.registros.forEach(function(r) {
    if (r.colabId === id && r.mes === mes && r.status === 'aprovado') pts += parseFloat(r.pts)||0;
  });
  return Math.max(0, Math.min(200, pts));
}
function pb(pts) {
  var pct = Math.min(100, Math.max(0, pts));
  var c = pts >= 80 ? '#1db36e' : pts >= 50 ? '#e67e22' : '#e74c3c';
  return '<span class="pb-w"><span class="pb" style="width:' + pct + '%;background:' + c + '"></span></span>';
}
function tagSt(s) { return '<span class="tag tag-' + s + '">' + ({pendente:'⏳ Pend.',aprovado:'✅ Aprov.',recusado:'❌ Recus.',cancelado:'🚫 Canc.'}[s]||s) + '</span>'; }
function tagNv(tipo, nivel) { var m = tipo==='inconformidade'?INCONF:BONUS; return '<span class="tag tag-' + nivel + '">' + (m[nivel]?m[nivel].cn:nivel) + '</span>'; }
function liderColabs(lid) { return S.colabs.filter(function(c){ return c.liderId === lid; }); }
function supLiders(turno) { return S.users.filter(function(u){ return u.role==='lider' && u.turno===turno; }); }
function coordSups(turno) { return S.users.filter(function(u){ return u.role==='supervisor' && u.turno===turno; }); }
function getUser(id) { return S.users.find(function(u){ return u.id===id; }); }
function getColab(id) { return S.colabs.find(function(c){ return c.id===id; }); }
function lvColor(k) { return {leve:'#1db36e',medio:'#e67e22',grave:'#e74c3c',critico:'#8e0000',bom:'#1db36e',muitobom:'#1565c0',excelente:'#7c3aed',extraordinario:'#c65100'}[k]||'#888'; }
function barChart(data) {
  var max = Math.max.apply(null, data.map(function(d){ return d.v||0; })) || 1;
  return '<div class="bc">' + data.map(function(d) {
    var h = Math.max(4, Math.round((d.v||0)/max*100));
    return '<div class="bc-col"><div class="bc-val" style="color:' + d.c + '">' + (d.v||0) + '</div>' +
      '<div class="bc-bar" style="height:' + h + 'px;background:' + d.c + '"></div>' +
      '<div class="bc-lbl">' + d.l + '</div></div>';
  }).join('') + '</div>';
}
function rankCard(colabs, mes) {
  var sorted = colabs.slice().map(function(c){ return {n:c.name,t:c.turno,pts:getColabPts(c.id,mes)}; })
    .sort(function(a,b){ return b.pts-a.pts; }).slice(0,8);
  var rows = sorted.length ? sorted.map(function(c,i) {
    var medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1;
    return '<tr class="' + (i<3?'hl':'') + '"><td>' + medal + '</td><td>' + c.n + '</td>' +
      '<td><span class="turno">' + c.t + '</span></td>' +
      '<td><span class="' + (c.pts>=100?'pts-p':'pts-n') + '">' + c.pts + '</span></td></tr>';
  }).join('') : '<tr><td colspan="4" class="empty">Sem dados</td></tr>';
  return '<div class="card"><div class="card-title">🏆 Ranking — ' + mes + '</div><div class="tw"><table>' +
    '<thead><tr><th>#</th><th>Colaborador / 员工</th><th>Turno</th><th>Pts</th></tr></thead>' +
    '<tbody>' + rows + '</tbody></table></div></div>';
}

function processXlsx() {
  var file = document.getElementById('xlsxFile').files[0];
  if (!file) { toast('Selecione um arquivo','warn'); return; }
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var wb = XLSX.read(e.target.result,{type:'binary'});
      var data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
      document.getElementById('xlpreview').innerHTML = '<div class="alert alert-info">📋 ' + data.length + ' linhas lidas. Enviando... / ' + data.length + '行，上传中...</div>';
      api('importColabs',{callerRole:S.user.role,rows:data}).then(function(res){
        if (!res.ok) { toast(res.msg,'error'); return; }
        toast(res.msg,'success');
        refreshData();
      });
    } catch(err) { toast('Erro ao ler Excel: ' + err.message,'error'); }
  };
  reader.readAsBinaryString(file);
}

// ============================================================
//  PAGE: REGISTRAR
//  Hierarquia de targets:
//  Líder       → seus colaboradores (auxiliar/focal/assistente)
//  Supervisor  → líderes do turno + colaboradores dos líderes do turno
//  Coordenador → supervisores do turno + líderes do turno + colaboradores do turno
//  Admin       → todos
// ============================================================
function buildTargets() {
  var u = S.user;
  var targets = [];

  if (u.role === 'lider') {
    // Apenas seus colaboradores
    liderColabs(u.id).forEach(function(c) {
      targets.push({ id: c.id, lb: c.name + ' — ' + (CARGO_LABELS[c.cargo]||c.cargo), grp: 'Colaboradores / 员工' });
    });

  } else if (u.role === 'supervisor') {
    // 1) Líderes do turno
    supLiders(u.turno||'').forEach(function(l) {
      targets.push({ id: l.id, lb: l.name, grp: 'Líderes / 领班' });
    });
    // 2) Colaboradores dos líderes do turno
    S.colabs.filter(function(c) {
      var lids = supLiders(u.turno||'').map(function(l){ return l.id; });
      return lids.indexOf(c.liderId) >= 0;
    }).forEach(function(c) {
      targets.push({ id: c.id, lb: c.name + ' — ' + (CARGO_LABELS[c.cargo]||c.cargo), grp: 'Colaboradores / 员工' });
    });

  } else if (u.role === 'coordenador') {
    // 1) Supervisores do turno
    coordSups(u.turno||'').forEach(function(s) {
      targets.push({ id: s.id, lb: s.name, grp: 'Supervisores / 主管' });
    });
    // 2) Líderes do turno
    S.users.filter(function(x){ return x.role==='lider' && x.turno===u.turno; }).forEach(function(l) {
      targets.push({ id: l.id, lb: l.name, grp: 'Líderes / 领班' });
    });
    // 3) Colaboradores do turno
    S.colabs.filter(function(c){ return c.turno===u.turno; }).forEach(function(c) {
      targets.push({ id: c.id, lb: c.name + ' — ' + (CARGO_LABELS[c.cargo]||c.cargo), grp: 'Colaboradores / 员工' });
    });

  } else if (u.role === 'admin') {
    // Todos os níveis exceto admin e gerente
    ['supervisor','coordenador','lider'].forEach(function(r) {
      S.users.filter(function(x){ return x.role===r; }).forEach(function(x) {
        targets.push({ id: x.id, lb: x.name, grp: ROLE_LABELS[r] });
      });
    });
    S.colabs.forEach(function(c) {
      targets.push({ id: c.id, lb: c.name + ' — ' + (CARGO_LABELS[c.cargo]||c.cargo), grp: 'Colaboradores / 员工' });
    });
  }
  return targets;
}

function buildTargetOpts(targets) {
  // Agrupa por grp com <optgroup>
  var groups = {};
  var order  = [];
  targets.forEach(function(t) {
    if (!groups[t.grp]) { groups[t.grp] = []; order.push(t.grp); }
    groups[t.grp].push(t);
  });
  var html = '<option value="">Selecionar... / 请选择...</option>';
  order.forEach(function(grp) {
    html += '<optgroup label="' + esc(grp) + '">';
    groups[grp].forEach(function(t) {
      html += '<option value="' + t.id + '">' + esc(t.lb) + '</option>';
    });
    html += '</optgroup>';
  });
  return html;
}

    regs = S.registros.filter(function(r){return r.status==='pendente'&&(r.autorRole==='supervisor'||r.autorRole==='coordenador')&&r.autorTurno===u.turno;});
  } else if (u.role==='admin') {
    regs = S.registros.filter(function(r){return r.status==='pendente';});
  }
  var rows = regs.length ? regs.map(function(r){
    var c = getColab(r.colabId)||getUser(r.colabId);

      '<td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px" title="' + esc(r.motivo||'') + '">' + (r.motivo||'—') + '</td>' +

      '</div></td></tr>';
  }).join('') : '<tr><td colspan="8" class="empty"><span class="empty-ic">✅</span>Nenhum pendente / 无待审批</td></tr>';
  return '<div class="card"><div class="card-hd"><div><div class="card-title">✅ Validar Registros / 审批记录</div>' +
    '<div class="card-sub">' + regs.length + ' registro(s) pendente(s) / ' + regs.length + '条待审批</div></div>' +
    '<button class="btn btn-ghost btn-sm" onclick="refreshData()">🔄</button></div>' +
    '<div class="tw"><table><thead><tr><th>Mês</th><th>Tipo</th><th>Colaborador</th><th>Nível</th><th>Pts</th><th>Autor</th><th>Motivo</th><th>Ações / 操作</th></tr></thead>' +
    '<tbody>' + rows + '</tbody></table></div></div>';
}

function validar(id, status) {
  api('validarRegistro',{id:id,status:status,callerRole:S.user.role,callerId:S.user.id}).then(function(res){
    if (!res.ok) { toast(res.msg,'error'); return; }
    toast({aprovado:'✅ Aprovado / 已批准',recusado:'❌ Recusado / 已拒绝',cancelado:'🚫 Cancelado / 已取消'}[status],'success');
    refreshData();
  });
}

// ============================================================
//  PAGE: RELATÓRIOS
// ============================================================
function pgRelatorios() {
  var mes = S.config.meAtual||'';
  var sorted = S.colabs.slice().map(function(c){return {n:c.name,t:c.turno,pts:getColabPts(c.id,mes)};}).sort(function(a,b){return b.pts-a.pts;});
  var ap = S.registros.filter(function(r){return r.status==='aprovado'&&r.mes===mes;});
  var rows = sorted.map(function(c,i){
    var medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1;
    return '<tr class="' + (i<3?'hl':'') + '"><td>' + medal + '</td><td>' + c.n + '</td>' +
      '<td><span class="turno">' + c.t + '</span></td>' +
      '<td><span class="' + (c.pts>=100?'pts-p':'pts-n') + '">' + c.pts + '</span></td>' +
      '<td>' + pb(c.pts) + '</td></tr>';
  }).join('');
  return '<div class="g2">' +
    '<div class="card"><div class="card-title">🏆 Ranking — ' + mes + '</div><div class="tw"><table>' +
    '<thead><tr><th>#</th><th>Colaborador</th><th>Turno</th><th>Pts</th><th>Barra</th></tr></thead>' +
    '<tbody>' + (rows||'<tr><td colspan="5" class="empty">Sem dados</td></tr>') + '</tbody></table></div></div>' +
    '<div><div class="card"><div class="card-title">Inconformidades / 不合格项 — ' + mes + '</div>' +
    barChart(Object.keys(INCONF).map(function(k){return{l:INCONF[k].cn,v:ap.filter(function(r){return r.tipo==='inconformidade'&&r.nivel===k;}).length,c:lvColor(k)};})) + '</div>' +
    '<div class="card" style="margin-top:0"><div class="card-title">Bônus por nível / 奖励级别</div>' +
    barChart(Object.keys(BONUS).map(function(k){return{l:BONUS[k].cn,v:ap.filter(function(r){return r.tipo==='bonus'&&r.nivel===k;}).length,c:lvColor(k)};})) + '</div>' +
    '<button class="btn btn-gold" onclick="exportExcel()" style="margin-top:4px">📊 Exportar Excel / 导出</button></div></div>';
}

function exportExcel() {
  var mes = S.config.meAtual||'';
  var rows = S.colabs.map(function(c){
    var lider = getUser(c.liderId);
    return {Nome:c.name,Cargo:c.cargo,Turno:c.turno,Modalidade:c.modalidade,Lider:lider?lider.name:'',Pontos:getColabPts(c.id,mes),Mes:mes};
  });
  var ws = XLSX.utils.json_to_sheet(rows);
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,'Avaliacao',ws);
  XLSX.writeFile(wb,'avaliacao_' + mes + '.xlsx');
  toast('Excel exportado / 已导出','success');
}

// ============================================================
//  PAGE: CONFIG
// ============================================================
function pgConfig() {
  var urlOk = GS_URL !== 'COLE_AQUI_A_URL_DO_SEU_WEB_APP';
  return '<div class="card"><div class="card-title">⚙️ Configurações / 配置</div>' +
    '<div class="fg"><label>Mês de referência atual / 当前参考月份</label><input type="month" id="cfg_mes" value="' + (S.config.meAtual||'') + '"></div>' +
    '<button class="btn btn-primary" onclick="saveConfig()">💾 Salvar / 保存</button></div>' +
    '<div class="card"><div class="card-title">🔗 Apps Script</div>' +
    (urlOk ? '<div class="alert alert-success">✅ URL configurada / URL已配置</div>' : '<div class="alert alert-warn">⚠️ Configure a variável GS_URL no topo do arquivo HTML!</div>') +
    '<div class="fg" style="margin-top:8px"><label>URL atual / 当前URL</label><input value="' + esc(GS_URL) + '" readonly></div></div>' +
    '<div class="card"><div class="card-title">📊 Exportar / 导出</div>' +
    '<button class="btn btn-gold" onclick="exportExcel()">📊 Exportar Relatório Excel</button></div>';
}

function saveConfig() {
  var mes = (document.getElementById('cfg_mes')||{}).value;
  if (!mes) { toast('Informe o mês','warn'); return; }
  api('saveConfig',{callerRole:S.user.role,configs:{meAtual:mes}}).then(function(res){
    if (!res.ok) { toast(res.msg,'error'); return; }
    S.config.meAtual = mes;
    document.getElementById('tb-month').textContent = '📅 ' + mes;
    toast('Configuração salva / 配置已保存','success');
    refreshData();
  });
}

// ============================================================
//  PAGE: FEEDBACK PDF
// ============================================================
function pgFeedback() {
  // Construir lista de pessoas disponíveis para gerar feedback
  var u = S.user;
  var people = [];

  if (u.role === 'lider') {
    liderColabs(u.id).forEach(function(c){ people.push({id:c.id,name:c.name,role:'colab',cargo:c.cargo,turno:c.turno}); });
  } else if (u.role === 'supervisor') {
    supLiders(u.turno||'').forEach(function(l){ people.push({id:l.id,name:l.name,role:'lider',cargo:'lider',turno:l.turno}); });
    S.colabs.filter(function(c){ var lids=supLiders(u.turno||'').map(function(l){return l.id;}); return lids.indexOf(c.liderId)>=0; })
      .forEach(function(c){ people.push({id:c.id,name:c.name,role:'colab',cargo:c.cargo,turno:c.turno}); });
  } else if (u.role === 'coordenador') {
    coordSups(u.turno||'').forEach(function(s){ people.push({id:s.id,name:s.name,role:'supervisor',cargo:'supervisor',turno:s.turno}); });
    S.users.filter(function(x){ return x.role==='lider'&&x.turno===u.turno; }).forEach(function(l){ people.push({id:l.id,name:l.name,role:'lider',cargo:'lider',turno:l.turno}); });
    S.colabs.filter(function(c){ return c.turno===u.turno; }).forEach(function(c){ people.push({id:c.id,name:c.name,role:'colab',cargo:c.cargo,turno:c.turno}); });
  } else if (u.role === 'admin') {
    S.users.filter(function(x){ return x.role!=='admin'&&x.role!=='gerente'; }).forEach(function(x){ people.push({id:x.id,name:x.name,role:x.role,cargo:x.role,turno:x.turno}); });
    S.colabs.forEach(function(c){ people.push({id:c.id,name:c.name,role:'colab',cargo:c.cargo,turno:c.turno}); });
  }

  var pessoaOpts = '<option value="">Selecionar pessoa / 请选择人员...</option>' +
    people.map(function(p){ return '<option value="' + p.id + '">' + esc(p.name) + ' — ' + esc(p.cargo) + ' ' + (p.turno?'('+p.turno+')':'') + '</option>'; }).join('');

  var mesAtual = S.config.meAtual || '';
  var meses = [];
  var regsAll = S.registros;
  regsAll.forEach(function(r){ if(r.mes && meses.indexOf(r.mes)<0) meses.push(r.mes); });
  meses.sort().reverse();
  if (meses.indexOf(mesAtual)<0 && mesAtual) meses.unshift(mesAtual);
  var mesOpts = meses.map(function(m){ return '<option value="' + m + '"' + (m===mesAtual?' selected':'') + '>' + m + '</option>'; }).join('');

  return '<div class="card"><div class="card-hd">' +
    '<div><div class="card-title">🖨️ Gerar Feedback PDF / 生成反馈PDF</div>' +
    '<div class="card-sub">Pré-visualização e impressão de inconformidades e bonificações / 预览并打印不合格项和奖励</div></div>' +
    '</div>' +
    '<div class="pdf-filter-bar">' +
      '<div class="fg"><label>Pessoa / 人员</label><select id="fb_pessoa" onchange="updateFbPreview()">' + pessoaOpts + '</select></div>' +
      '<div class="fg"><label>Mês / 月份</label><select id="fb_mes" onchange="updateFbPreview()">' + mesOpts + '</select></div>' +
      '<div class="fg"><label>Tipo / 类型</label>' +
        '<select id="fb_tipo" onchange="updateFbPreview()">' +
          '<option value="todos">Todos / 全部</option>' +
          '<option value="inconformidade">Inconformidades / 不合格项</option>' +
          '<option value="bonus">Bonificações / 奖励</option>' +
        '</select>' +
      '</div>' +
      '<div class="fg"><label>Status</label>' +
        '<select id="fb_status" onchange="updateFbPreview()">' +
          '<option value="todos">Todos / 全部</option>' +
          '<option value="aprovado">Aprovados / 已批准</option>' +
          '<option value="pendente">Pendentes / 待审批</option>' +
        '</select>' +
      '</div>' +
    '</div>' +
    '<div style="display:flex;gap:10px;margin-bottom:16px">' +
      '<button class="btn btn-primary" onclick="updateFbPreview()">👁️ Pré-visualizar / 预览</button>' +
      '<button class="btn btn-gold" onclick="imprimirFeedback()">🖨️ Imprimir / 打印</button>' +
    '</div>' +
    '<div id="fb-preview-area"><div class="empty"><span class="empty-ic">🖨️</span>Selecione uma pessoa e mês para gerar o feedback / 选择人员和月份生成反馈</div></div>' +
  '</div>';
}

function getFbPerson(id) {
  var c = S.colabs.find(function(x){ return x.id===id; });
  if (c) return { name:c.name, cargo:CARGO_LABELS[c.cargo]||c.cargo, turno:c.turno, lider:getUser(c.liderId), isUser:false };
  var u = S.users.find(function(x){ return x.id===id; });
  if (u) return { name:u.name, cargo:ROLE_LABELS[u.role]||u.role, turno:u.turno, lider:null, isUser:true };
  return null;
}

function updateFbPreview() {
  var pessoaId = (document.getElementById('fb_pessoa')||{}).value;
  var mes      = (document.getElementById('fb_mes')||{}).value;
  var tipo     = (document.getElementById('fb_tipo')||{}).value||'todos';
  var status   = (document.getElementById('fb_status')||{}).value||'todos';
  var area     = document.getElementById('fb-preview-area');
  if (!pessoaId || !mes) {
    area.innerHTML = '<div class="empty"><span class="empty-ic">🖨️</span>Selecione uma pessoa e mês / 请选择人员和月份</div>';
    return;
  }
  area.innerHTML = '<div class="loading-row"><span class="spin"></span> Gerando pré-visualização... / 生成预览中...</div>';
  setTimeout(function() {
    var html = buildFeedbackHTML(pessoaId, mes, tipo, status);
    area.innerHTML = '<div class="pdf-preview-wrap">' + html + '</div>';
  }, 80);
}

function buildFeedbackHTML(pessoaId, mes, tipo, status) {
  var person = getFbPerson(pessoaId);
  if (!person) return '<div class="empty">Pessoa não encontrada</div>';

  var autor = S.user;
  var pts   = getColabPts(pessoaId, mes);

  // Filtrar registros
  var regs = S.registros.filter(function(r) {
    if (r.colabId !== pessoaId) return false;
    if (r.mes !== mes) return false;
    if (tipo !== 'todos' && r.tipo !== tipo) return false;
    if (status !== 'todos' && r.status !== status) return false;
    return true;
  });

  var incs  = regs.filter(function(r){ return r.tipo==='inconformidade'; });
  var bonus = regs.filter(function(r){ return r.tipo==='bonus'; });
  var totalInc   = incs.reduce(function(s,r){ return s+(parseFloat(r.pts)||0); }, 0);
  var totalBonus = bonus.reduce(function(s,r){ return s+(parseFloat(r.pts)||0); }, 0);
  var hoje  = new Date().toLocaleDateString('pt-BR');

  // Cor da barra de pts
  var barColor = pts>=80?'#1db36e':pts>=50?'#e67e22':'#e74c3c';
  var pct      = Math.min(100, Math.max(0, pts));

  var badgeClass = {
    leve:    'pdf-item-badge-inconf-leve',
    medio:   'pdf-item-badge-inconf-medio',
    grave:   'pdf-item-badge-inconf-grave',
    critico: 'pdf-item-badge-inconf-critico',
    bom:     'pdf-item-badge-bonus-bom',
    muitobom:'pdf-item-badge-bonus-muitobom',
    excelente:'pdf-item-badge-bonus-excelente',
    extraordinario:'pdf-item-badge-bonus-extraordinario'
  };

  function renderItems(list) {
    if (!list.length) return '<div class="pdf-empty-sec">Nenhum registro nesta categoria / 此类别无记录</div>';
    return list.map(function(r) {
      var map   = r.tipo==='inconformidade'?INCONF:BONUS;
      var lvl   = map[r.nivel]||{label:r.nivel,cn:r.nivel,pts:0};
      var ptsN  = parseFloat(r.pts)||0;
      var regAutor = getUser(r.autorId);
      var crit  = r.criterio ? ' • ' + r.criterio : '';
      return '<div class="pdf-item pdf-item-' + r.tipo + '">' +
        '<div class="pdf-item-header">' +
          '<div class="pdf-item-title">' + (r.tipo==='inconformidade'?'❌ Inconformidade':'⭐ Bonificação') + crit + '</div>' +
          '<span class="pdf-item-badge ' + (badgeClass[r.nivel]||'') + '">' + lvl.label + '</span>' +
        '</div>' +
        '<div class="pdf-item-motivo">' + esc(r.motivo||'') + '</div>' +
        '<div class="pdf-item-footer">' +
          '<span>Registrado por: ' + (regAutor?esc(regAutor.name):'—') + ' &nbsp;|&nbsp; Status: ' + r.status + '</span>' +
          '<span class="pdf-item-pts ' + (ptsN>=0?'pdf-pts-pos':'pdf-pts-neg') + '">' + (ptsN>0?'+':'') + ptsN + ' pts</span>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  var html =
    '<div class="pdf-page" id="pdf-content">' +
      // HEADER
      '<div class="pdf-header">' +
        '<div class="pdf-logo-area">' +
          '<div class="pdf-logo-box">⭐</div>' +
          '<div><div class="pdf-logo-text">AvaliaGO</div><div class="pdf-logo-sub">Sistema de Avaliação / 评估系统</div></div>' +
        '</div>' +
        '<div class="pdf-meta">' +
          '<b>Relatório de Feedback / 反馈报告</b>' +
          'Mês / 月份: ' + mes + '<br>' +
          'Emitido em / 发布日期: ' + hoje + '<br>' +
          'Por / 由: ' + esc(autor.name) +
        '</div>' +
      '</div>' +

      // HERO — colaborador
      '<div class="pdf-hero">' +
        '<div>' +
          '<div class="pdf-hero-name">' + esc(person.name) + '</div>' +
          '<div class="pdf-hero-info">' + esc(person.cargo) + (person.turno?' &nbsp;|&nbsp; Turno ' + esc(person.turno):'') +
            (person.lider?' &nbsp;|&nbsp; Líder: ' + esc(person.lider.name):'') + '</div>' +
        '</div>' +
        '<div class="pdf-hero-pts">' +
          '<div class="pdf-hero-pts-num">' + pts + '</div>' +
          '<div class="pdf-hero-pts-label">pontos / 分数</div>' +
        '</div>' +
      '</div>' +

      // BARRA DE PONTOS
      '<div style="margin-bottom:18px">' +
        '<div style="display:flex;justify-content:space-between;font-size:11px;color:#556080;margin-bottom:4px">' +
          '<span>Pontuação do mês / 本月得分</span>' +
          '<span style="font-weight:700;color:' + barColor + '">' + pts + '/100 pts</span>' +
        '</div>' +
        '<div class="pdf-bar-track"><div class="pdf-bar-fill" style="width:' + pct + '%;background:' + barColor + '"></div></div>' +
      '</div>' +

      // RESUMO
      '<div class="pdf-summary-grid">' +
        '<div class="pdf-summary-box"><div class="pdf-summary-num">' + regs.length + '</div><div class="pdf-summary-label">Total registros / 总记录</div></div>' +
        '<div class="pdf-summary-box"><div class="pdf-summary-num" style="color:#e74c3c">' + incs.length + '</div><div class="pdf-summary-label">Inconformidades / 不合格</div></div>' +
        '<div class="pdf-summary-box"><div class="pdf-summary-num" style="color:#1db36e">' + bonus.length + '</div><div class="pdf-summary-label">Bonificações / 奖励</div></div>' +
        '<div class="pdf-summary-box">' +
          '<div class="pdf-summary-num ' + (totalBonus+totalInc>=0?'pdf-pts-pos':'pdf-pts-neg') + '">' + (totalBonus+totalInc>0?'+':'') + (totalBonus+totalInc) + '</div>' +
          '<div class="pdf-summary-label">Δ pontos / 分数变化</div>' +
        '</div>' +
      '</div>' +

      // SEÇÃO INCONFORMIDADES
      ((tipo==='todos'||tipo==='inconformidade') ?
        '<div class="pdf-section-title">❌ Inconformidades / 不合格项 (' + incs.length + ')</div>' +
        renderItems(incs) : '') +

      // SEÇÃO BÔNUS
      ((tipo==='todos'||tipo==='bonus') ?
        '<div class="pdf-section-title" style="margin-top:' + ((tipo==='todos'&&incs.length?'18px':'0') ) + '">⭐ Bonificações / 奖励 (' + bonus.length + ')</div>' +
        renderItems(bonus) : '') +

      // ASSINATURAS
      '<div class="pdf-sign-area">' +
        '<div class="pdf-sign-box">' +
          '<div class="pdf-sign-line"></div>' +
          '<div class="pdf-sign-name">' + esc(person.name) + '</div>' +
          '<div class="pdf-sign-role">' + esc(person.cargo) + '</div>' +
        '</div>' +
        '<div class="pdf-sign-box">' +
          '<div class="pdf-sign-line"></div>' +
          '<div class="pdf-sign-name">' + esc(autor.name) + '</div>' +
          '<div class="pdf-sign-role">' + esc(ROLE_LABELS[autor.role]||autor.role) + '</div>' +
        '</div>' +
      '</div>' +

      // FOOTER
      '<div class="pdf-footer-doc">AvaliaGO — Sistema de Avaliação / 评估系统 &nbsp;|&nbsp; Documento gerado automaticamente / 自动生成文档 &nbsp;|&nbsp; ' + hoje + '</div>' +
    '</div>';

  return html;
}

function imprimirFeedback() {
  var pessoaId = (document.getElementById('fb_pessoa')||{}).value;
  var mes      = (document.getElementById('fb_mes')||{}).value;
  var tipo     = (document.getElementById('fb_tipo')||{}).value||'todos';
  var status   = (document.getElementById('fb_status')||{}).value||'todos';
  if (!pessoaId || !mes) { toast('Selecione pessoa e mês antes de imprimir / 请先选择人员和月份','warn'); return; }

  var html = buildFeedbackHTML(pessoaId, mes, tipo, status);
  var frame = document.getElementById('print-frame');
  frame.innerHTML = '<div class="pdf-preview-wrap">' + html + '</div>';
  window.print();
  setTimeout(function(){ frame.innerHTML = ''; }, 2000);
}


function showModal(html, lg) {
  document.getElementById('mod-container').innerHTML =
    '<div class="mo" onclick="closeOnBg(event)"><div class="modal' + (lg?' modal-lg':'') + '">' +
    '<button class="modal-x" onclick="closeModal()">×</button>' + html + '</div></div>';
}
function closeModal() { document.getElementById('mod-container').innerHTML = ''; }
function closeOnBg(e) { if (e.target.classList.contains('mo')) closeModal(); }

// ============================================================
//  UTIL
// ============================================================
function esc(s) { return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('login').style.display !== 'none') doLogin();
});
</script>
